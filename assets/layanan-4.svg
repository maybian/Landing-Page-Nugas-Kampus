<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <radialGradient id="glow4" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#FDC45C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FDC45C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDC45C"/>
      <stop offset="100%" stop-color="#FD8500"/>
    </linearGradient>
    <radialGradient id="shadow4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#080807" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#080807" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="160" cy="150" r="140" fill="url(#glow4)"/>
  <ellipse cx="160" cy="272" rx="95" ry="16" fill="url(#shadow4)"/>

  <!-- easel legs -->
  <polygon points="100,254 116,150 122,150 112,254" fill="#080807"/>
  <polygon points="220,254 204,150 198,150 208,254" fill="#080807"/>
  <rect x="96" y="196" width="128" height="8" rx="4" fill="#080807"/>

  <!-- canvas / poster -->
  <rect x="90" y="60" width="140" height="150" rx="6" fill="#FCFCFB" stroke="#080807" stroke-width="4"/>

  <!-- poster layout: image block -->
  <rect x="104" y="74" width="112" height="60" rx="4" fill="url(#gold4)"/>
  <circle cx="130" cy="98" r="12" fill="#FCFCFB" opacity="0.85"/>
  <polygon points="150,124 172,96 200,124" fill="#FCFCFB" opacity="0.75"/>

  <!-- poster text lines -->
  <rect x="104" y="144" width="80" height="8" rx="4" fill="#080807"/>
  <rect x="104" y="158" width="112" height="5" rx="2.5" fill="#080807" opacity="0.4"/>
  <rect x="104" y="168" width="96" height="5" rx="2.5" fill="#080807" opacity="0.4"/>
  <rect x="104" y="178" width="104" height="5" rx="2.5" fill="#080807" opacity="0.3"/>
  <rect x="104" y="188" width="70" height="5" rx="2.5" fill="#080807" opacity="0.3"/>

  <!-- color palette swatches -->
  <g transform="translate(240 90)">
    <circle cx="0" cy="0" r="14" fill="url(#gold4)"/>
    <circle cx="22" cy="10" r="14" fill="#080807"/>
    <circle cx="6" cy="30" r="14" fill="#FCFCFB" stroke="#080807" stroke-width="2"/>
  </g>

  <!-- pen tool -->
  <g transform="translate(58 70) rotate(30)">
    <rect x="0" y="0" width="12" height="76" rx="5" fill="url(#gold4)"/>
    <polygon points="0,76 12,76 6,92" fill="#080807"/>
  </g>

  <!-- ruler -->
  <g transform="translate(64 200) rotate(-18)">
    <rect x="0" y="0" width="90" height="16" rx="3" fill="#F1E7D6" stroke="#080807" stroke-width="2"/>
    <rect x="10" y="0" width="2" height="8" fill="#080807"/>
    <rect x="24" y="0" width="2" height="8" fill="#080807"/>
    <rect x="38" y="0" width="2" height="8" fill="#080807"/>
    <rect x="52" y="0" width="2" height="8" fill="#080807"/>
  </g>

  <!-- sparkles -->
  <g fill="url(#gold4)">
    <path d="M262 200 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4 z"/>
    <path d="M56 236 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>
  </g>
  <circle cx="76" cy="52" r="4" fill="#FDC45C"/>
  <circle cx="256" cy="240" r="5" fill="#FDC45C"/>
</svg>
