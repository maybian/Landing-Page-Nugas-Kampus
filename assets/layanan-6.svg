<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <radialGradient id="glow6" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#FDC45C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FDC45C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDC45C"/>
      <stop offset="100%" stop-color="#FD8500"/>
    </linearGradient>
    <radialGradient id="shadow6" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#080807" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#080807" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="160" cy="150" r="140" fill="url(#glow6)"/>
  <ellipse cx="160" cy="272" rx="95" ry="16" fill="url(#shadow6)"/>

  <!-- browser window -->
  <rect x="54" y="70" width="180" height="130" rx="10" fill="#FCFCFB" stroke="#080807" stroke-width="4"/>
  <rect x="54" y="70" width="180" height="24" rx="10" fill="#080807"/>
  <circle cx="68" cy="82" r="4" fill="url(#gold6)"/>
  <circle cx="80" cy="82" r="4" fill="#FCFCFB" opacity="0.6"/>
  <circle cx="92" cy="82" r="4" fill="#FCFCFB" opacity="0.6"/>

  <!-- dashboard bars -->
  <rect x="70" y="150" width="14" height="36" rx="3" fill="url(#gold6)"/>
  <rect x="90" y="130" width="14" height="56" rx="3" fill="#080807"/>
  <rect x="110" y="160" width="14" height="26" rx="3" fill="url(#gold6)"/>
  <rect x="130" y="140" width="14" height="46" rx="3" fill="#080807" opacity="0.75"/>

  <!-- trend line -->
  <polyline points="70,120 90,108 110,116 130,98 150,104 168,90" fill="none" stroke="url(#gold6)" stroke-width="3" stroke-linecap="round"/>

  <!-- widget card -->
  <rect x="182" y="104" width="40" height="82" rx="6" fill="#F1E7D6"/>
  <circle cx="202" cy="126" r="14" fill="none" stroke="url(#gold6)" stroke-width="6"/>
  <rect x="192" y="150" width="20" height="6" rx="3" fill="#080807" opacity="0.4"/>
  <rect x="192" y="162" width="20" height="6" rx="3" fill="#080807" opacity="0.3"/>

  <!-- connecting dotted line to gear -->
  <line x1="234" y1="150" x2="264" y2="150" stroke="#080807" stroke-width="2" stroke-dasharray="3 4" opacity="0.5"/>

  <!-- gear (automation) -->
  <g transform="translate(264 150)">
    <circle cx="0" cy="0" r="20" fill="url(#gold6)"/>
    <g fill="url(#gold6)">
      <rect x="-4" y="-28" width="8" height="12" rx="2"/>
      <rect x="-4" y="16" width="8" height="12" rx="2"/>
      <rect x="-28" y="-4" width="12" height="8" rx="2"/>
      <rect x="16" y="-4" width="12" height="8" rx="2"/>
    </g>
    <circle cx="0" cy="0" r="9" fill="#080807"/>
  </g>

  <!-- database cylinder -->
  <g transform="translate(40 210)">
    <ellipse cx="20" cy="6" rx="20" ry="8" fill="url(#gold6)"/>
    <rect x="0" y="6" width="40" height="26" fill="#080807"/>
    <ellipse cx="20" cy="32" rx="20" ry="8" fill="#080807"/>
    <ellipse cx="20" cy="6" rx="20" ry="8" fill="none" stroke="#FCFCFB" stroke-width="1.5" opacity="0.4"/>
  </g>
  <line x1="80" y1="216" x2="60" y2="200" stroke="#080807" stroke-width="2" stroke-dasharray="3 4" opacity="0.5"/>

  <!-- sparkles -->
  <g fill="url(#gold6)">
    <path d="M268 70 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4 z"/>
    <path d="M36 88 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>
  </g>
  <circle cx="252" cy="250" r="5" fill="#FDC45C"/>
</svg>
