<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#FDC45C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FDC45C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDC45C"/>
      <stop offset="100%" stop-color="#FD8500"/>
    </linearGradient>
    <linearGradient id="goldSoft1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFDB8C"/>
      <stop offset="100%" stop-color="#FDC45C"/>
    </linearGradient>
    <radialGradient id="shadow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#080807" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#080807" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="160" cy="150" r="140" fill="url(#glow1)"/>
  <ellipse cx="160" cy="272" rx="95" ry="16" fill="url(#shadow1)"/>

  <!-- pages stack behind book -->
  <rect x="112" y="118" width="96" height="140" rx="6" fill="#FCFCFB"/>
  <rect x="118" y="112" width="96" height="140" rx="6" fill="#F1E7D6"/>

  <!-- book cover -->
  <rect x="96" y="104" width="112" height="150" rx="8" fill="#080807"/>
  <rect x="96" y="104" width="18" height="150" rx="6" fill="#FD8500"/>
  <rect x="126" y="140" width="66" height="8" rx="4" fill="#FCFCFB" opacity="0.9"/>
  <rect x="126" y="158" width="46" height="6" rx="3" fill="#FDC45C" opacity="0.85"/>
  <rect x="126" y="172" width="52" height="6" rx="3" fill="#FDC45C" opacity="0.6"/>

  <!-- ribbon bookmark -->
  <path d="M170 104 L186 104 L186 150 L178 140 L170 150 Z" fill="url(#gold1)"/>

  <!-- graduation cap on top -->
  <g transform="translate(150 78) rotate(-8)">
    <polygon points="0,14 42,0 84,14 42,28" fill="#080807"/>
    <rect x="34" y="14" width="16" height="16" fill="#080807"/>
    <circle cx="42" cy="14" r="4" fill="url(#gold1)"/>
    <path d="M78 14 Q86 30 80 42" stroke="url(#gold1)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="80" cy="44" r="4" fill="url(#gold1)"/>
  </g>

  <!-- magnifying glass over pages, checking similarity -->
  <g transform="translate(44 168) rotate(-6)">
    <circle cx="34" cy="34" r="34" fill="#FCFCFB" opacity="0.55"/>
    <circle cx="34" cy="34" r="34" fill="none" stroke="url(#gold1)" stroke-width="9"/>
    <rect x="18" y="20" width="32" height="5" rx="2.5" fill="#080807" opacity="0.55"/>
    <rect x="18" y="32" width="24" height="5" rx="2.5" fill="#080807" opacity="0.45"/>
    <rect x="60" y="60" width="20" height="9" rx="4.5" fill="url(#goldSoft1)" transform="rotate(45 60 60)"/>
  </g>

  <!-- check badge -->
  <g transform="translate(212 190)">
    <circle cx="22" cy="22" r="22" fill="url(#gold1)"/>
    <path d="M12 22 L19 29 L33 14" stroke="#FCFCFB" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- pencil -->
  <g transform="translate(206 90) rotate(35)">
    <rect x="0" y="0" width="14" height="70" rx="4" fill="url(#goldSoft1)"/>
    <polygon points="0,70 14,70 7,86" fill="#080807"/>
    <rect x="0" y="-10" width="14" height="12" rx="3" fill="#080807"/>
  </g>

  <!-- sparkles -->
  <g fill="url(#gold1)">
    <path d="M258 66 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4 z"/>
    <path d="M52 84 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>
    <path d="M270 224 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>
  </g>
  <circle cx="86" cy="60" r="4" fill="#FDC45C"/>
  <circle cx="240" cy="260" r="5" fill="#FDC45C"/>
</svg>
