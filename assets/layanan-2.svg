<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <radialGradient id="glow2" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#FDC45C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FDC45C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDC45C"/>
      <stop offset="100%" stop-color="#FD8500"/>
    </linearGradient>
    <radialGradient id="shadow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#080807" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#080807" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="160" cy="150" r="140" fill="url(#glow2)"/>
  <ellipse cx="160" cy="272" rx="95" ry="16" fill="url(#shadow2)"/>

  <!-- back journal (template A) -->
  <g transform="rotate(-14 160 180)">
    <rect x="86" y="96" width="100" height="132" rx="7" fill="#F1E7D6"/>
    <rect x="86" y="96" width="100" height="26" rx="7" fill="url(#gold2)"/>
  </g>

  <!-- middle journal (template B) -->
  <g transform="rotate(6 160 180)">
    <rect x="120" y="88" width="100" height="132" rx="7" fill="#FCFCFB"/>
    <rect x="120" y="88" width="100" height="26" rx="7" fill="#080807"/>
    <rect x="132" y="132" width="76" height="6" rx="3" fill="#080807" opacity="0.5"/>
    <rect x="132" y="146" width="60" height="6" rx="3" fill="#080807" opacity="0.35"/>
    <rect x="132" y="160" width="68" height="6" rx="3" fill="#080807" opacity="0.35"/>
    <rect x="132" y="174" width="48" height="6" rx="3" fill="#080807" opacity="0.25"/>
  </g>

  <!-- front journal (main template) -->
  <g transform="rotate(-4 130 190)">
    <rect x="66" y="128" width="98" height="126" rx="7" fill="#FCFCFB"/>
    <rect x="66" y="128" width="98" height="24" rx="7" fill="url(#gold2)"/>
    <rect x="76" y="164" width="78" height="7" rx="3.5" fill="#080807" opacity="0.55"/>
    <rect x="76" y="180" width="60" height="5" rx="2.5" fill="#080807" opacity="0.4"/>
    <rect x="76" y="192" width="66" height="5" rx="2.5" fill="#080807" opacity="0.4"/>
    <rect x="76" y="204" width="50" height="5" rx="2.5" fill="#080807" opacity="0.3"/>
    <rect x="76" y="220" width="30" height="14" rx="4" fill="url(#gold2)" opacity="0.9"/>
  </g>

  <!-- citation quote bubble -->
  <g transform="translate(196 66)">
    <circle cx="30" cy="30" r="30" fill="url(#gold2)"/>
    <path d="M18 24 q0 -10 10 -12 l0 6 q-5 1 -5 6 l5 0 0 12 -10 0 z" fill="#FCFCFB"/>
    <path d="M34 24 q0 -10 10 -12 l0 6 q-5 1 -5 6 l5 0 0 12 -10 0 z" fill="#FCFCFB"/>
  </g>

  <!-- APA/MLA tag -->
  <g transform="translate(198 210)">
    <rect x="0" y="0" width="70" height="26" rx="13" fill="#080807"/>
    <text x="35" y="18" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FDC45C" text-anchor="middle">APA</text>
  </g>

  <!-- sparkles -->
  <g fill="url(#gold2)">
    <path d="M262 130 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4 z"/>
    <path d="M56 232 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>
    <path d="M48 116 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>
  </g>
  <circle cx="250" cy="70" r="4" fill="#FDC45C"/>
  <circle cx="70" cy="260" r="5" fill="#FDC45C"/>
</svg>
